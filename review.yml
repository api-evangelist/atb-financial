actions:
  openapiHarvested: false
  reason: |
    No public developer portal and no downloadable OpenAPI/Swagger specification
    exist for ATB Financial. This is an honest identity-only (built-stub) record:
    a provincial Crown-corporation public bank whose consumer data access is
    available only through third-party aggregators (Finicity, Flinks), with no
    first-party API, no FDX endpoint, and no operational Canadian open-banking
    mandate to expose one.
